# Meson native file for building the Mesa venus ICD with clang-cl on win11.
# ALTERNATIVE toolchain (validated 2026-06-05): clang-cl 17 also compiles 100% of
# venus with zero Mesa edits, but needs more scaffolding than mingw (see below),
# so mingw-native.ini is preferred. See icd/PHASE5_HANDOVER.md §6.
#
# clang-cl extras vs mingw:
#  - MUST build from a LOCAL C: source mirror, NOT Z:\ — clang's #include-once
#    dedup needs stable inode identity the 9p share doesn't provide (else
#    "#include nested too deeply" on the zlib subproject). robocopy Z:\icd\mesa
#    to a C: dir and point meson at that.
#  - pin rc/windres to the SDK rc.exe (llvm-rc also chokes on the share), below.
#  - c_args/cpp_args also need -D_ALLOW_COMPILER_AND_STL_VERSION_MISMATCH
#    (MSVC 14.44 STL hard-gates Clang>=19; retire it + the atomic shim by moving
#    to LLVM>=19). The helios_win_compat.h forced-include covers pid_t + the
#    clang-cl interlocked-intrinsic + sync stubs.
# Toolchain: LLVM 17 at C:\Program Files\LLVM (clang-cl, lld-link on PATH);
# Windows SDK 10.0.26100 rc.exe.
[binaries]
c = 'clang-cl'
cpp = 'clang-cl'
c_ld = 'lld-link'
cpp_ld = 'lld-link'
windres = 'C:\Program Files (x86)\Windows Kits\10\bin\10.0.26100.0\x64\rc.exe'
rc = 'C:\Program Files (x86)\Windows Kits\10\bin\10.0.26100.0\x64\rc.exe'
